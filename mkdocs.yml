site_url: https://poltexious.github.io/undervisning/
site_name: Undervisning – Jakob Polcwiartek

theme:
  name: material
  language: da
  logo: assets/images/aatg-logo-hvid.svg
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
theme:
  name: material
  language: da
  logo: assets/images/aatg-logo-hvid.svg
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: grey
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Skift til light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: grey
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Skift til dark mode

copyright: "© BUILD_YEAR Jakob Polcwiartek"

plugins:
  - search
  - git-revision-date-localized:
      type: date
      locale: da
      timezone: Europe/Copenhagen
      fallback_to_build_date: true

extra:
  homepage: https://aatg.dk/studieretninger/gametech/
  generator: false

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/logo-link.js
  - javascripts/fag-farver.js
  - javascripts/text-size.js
  - javascripts/reading-progress.js
  - javascripts/move-revision-date.js
  - javascripts/external-links.js
  - javascripts/remember-nav-state.js

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Forside: index.md
  - Matematik: matematik/index.md
  - Fysik: fysik/index.md
  - Programmering B:
      - Oversigt: programmering-b/index.md
      - 1.g:
          - Overblik: programmering-b/1g/index.md
          - "F1.1 Velkommen til C#": programmering-b/1g/f1-1-velkommen-til-csharp.md
          - F1.2 Variabler og typer: programmering-b/1g/f1-2-variabler-og-typer.md
          - F1.3 Repetition (E-semester): programmering-b/1g/f1-3-repetition-e-semester.md
          - F1.4 Betingelser: programmering-b/1g/f1-4-betingelser.md
          - F1.5 Løkker: programmering-b/1g/f1-5-loekker.md
          - F1.6 Metoder: programmering-b/1g/f1-6-metoder.md
          - F1.7 Strings og arrays: programmering-b/1g/f1-7-strings-og-arrays.md
          - F1.8 Terninge-mekanik: programmering-b/1g/f1-8-terningemekanik.md
          - F1.9 Meyer-projektet: programmering-b/1g/f1-9-meyer-projektet.md
