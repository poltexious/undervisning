name: deploy
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: sed -i "s/BUILD_YEAR/$(date +%Y)/" mkdocs.yml
      - run: mkdocs gh-deploy --force